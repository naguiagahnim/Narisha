submitter:
  git.sr.ht:
    enabled: false

image: archlinux
packages:
  - cargo
  - go
  - libxkbcommon
  - lua54
  - luarocks
  - meson
  - ninja
  - pkgconf
  - reuse
  - wayland
sources:
  - https://codeberg.org/river/tinyrwm
tasks:
  - reuse: |
      cd tinyrwm
      reuse lint
  - c: |
      cd tinyrwm/c
      meson setup build
      ninja -C build
  - go: |
      cd tinyrwm/go
      go generate ./internal/proto
      if ! git diff --quiet ./internal/proto; then
        echo "Generated protocol code is stale; regenerate it with `go generate ./internal/proto`"
        exit 1
      fi
      go build -o tinyrwm
  - rust: |
      cd tinyrwm/rust
      cargo build
  - lua: |
      cd tinyrwm/lua
      eval $(luarocks path --bin)
      luarocks --lua-version 5.4 --local make
